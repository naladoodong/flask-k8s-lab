name: Flask-App GitOps Pipeline
on:
  push:
    branches: [ main ]
permissions:
  contents: write
jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    
    - name: Docker Login
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}
    
    - name: Build and Push
      run: |
        docker build -t m970306/flask-app:\${{ github.sha }} .
        docker push m970306/flask-app:\${{ github.sha }}
    - name: Update Manifest and Push
      run: |
        SHA=${{ github.sha }}

        sed -i "s|flask-app:.*|flask-app:${SHA}|g" deployment.yaml

        git config --global user.email "bot@github.com"
        git config --global user.name "github-actions[bot]"

        git add deployment.yaml
        git commit -m "chore: update image tag to ${SHA} [skip ci]" || echo "No changes"
        git push